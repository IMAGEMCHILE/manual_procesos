async function dbGetProcesses(){
  const {data,error}=await sb.from('processes').select('*');
  if(error){console.error('Error cargando procesos:',error);return[];}
  return (data||[]).map(r=>r.data);
}
async function dbSaveProcess(p){
  const {error}=await sb.from('processes').upsert({id:p.id,data:p},{onConflict:'id'});
  if(error)console.error('Error guardando proceso:',error);
}
async function dbDeleteProcess(id){
  const {error}=await sb.from('processes').delete().eq('id',id);
  if(error)console.error('Error eliminando proceso:',error);
}
async function dbGetProposals(){
  const {data,error}=await sb.from('proposals').select('*').order('created_at',{ascending:false});
  if(error){console.error('Error cargando propuestas:',error);return[];}
  return (data||[]).map(r=>r.data);

async function dbSaveUser(u){
  const {error}=await sb.from('usuarios').upsert({username:u.user,pass:u.pass,name:u.name,role:u.role,is_admin:!!u.isAdmin,area_ids:u.areaIds||null},{onConflict:'username'});
  if(error)console.error('Error guardando usuario:',error);
}
async function dbDeleteUser(username){
  const {error}=await sb.from('usuarios').delete().eq('username',username);
  if(error)console.error('Error eliminando usuario:',error);
}
async function dbUploadFile(file){
  const uniqueName=Date.now()+'_'+file.name;
  const {error}=await sb.storage.from('documentos').upload(uniqueName,file,{contentType:file.type||'application/octet-stream'});
  if(error){console.error('Error subiendo archivo:',error);return null;}
  const {data}=sb.storage.from('documentos').getPublicUrl(uniqueName);
  return {url:data.publicUrl,name:file.name,size:file.size};
}
// Valida y normaliza una URL de link
function normalizeLinkUrl(url){
  if(!url)return null;
  url=url.trim();
  if(url&&!url.startsWith('http://') && !url.startsWith('https://'))url='https://'+url;
  return url||null;
}

function normalizeProcesses(){
  state.processes.forEach((p,i)=>{if(p.position==null)p.position=i});
  state.processes.sort((a,b)=>a.position-b.position);
}
async function moveProcess(id,dir){
  const idx=state.processes.findIndex(p=>p.id===id);
  const j=idx+dir;
  if(idx<0||j<0||j>=state.processes.length)return;
  [state.processes[idx],state.processes[j]]=[state.processes[j],state.processes[idx]];
  state.processes[idx].position=idx;
  state.processes[j].position=j;
  await Promise.all([dbSaveProcess(state.processes[idx]), dbSaveProcess(state.processes[j])]);
  normalizeProcesses();
  render();
}

// ============ FLOW RENDER ============
// Estado de navegación de decisiones: { nodeId: branchIndex }
let flowBranchSelection = {};

function renderFlow(nodes, interactive = true){
  if(!nodes||nodes.length===0)return"";
  const byId={};nodes.forEach(n=>byId[n.id]=n);

  // Calcular índices de pasos globalmente
  let idx=0;const indices={};
  function walkIdx(n){if(!n||indices[n.id])return;if(n.type==="step"){idx++;indices[n.id]=idx}const nexts=n.type==="decision"?(n.branches||[]).map(b=>b.next):(n.next||[]);nexts.filter(Boolean).forEach(id=>walkIdx(byId[id]))}
  if(nodes[0])walkIdx(nodes[0]);
  function getStepIndex(id){return indices[id]||"·"}

  const rendered=new Set();
  let html='<div class="flow">';

  function renderNode(node){
    if(!node||rendered.has(node.id))return"";
    rendered.add(node.id);
    const a=getArea(node.area);
    const roleLabel=node.role?`<span class="role-tag">· ${esc(node.role)}</span>`:"";
    let h="";

    if(node.type==="step"){
      const nextIds=node.next||[];
      const hasNext=nextIds.length>0&&nextIds[0];
      h+=`<div class="node"><div class="ncol"><div class="nn" style="background:${a.color};">${getStepIndex(node.id)}</div>${hasNext?`<div class="line" style="background:${a.color};opacity:.4;"></div>`:""}</div><div class="ncn"><div><span class="al" style="background:${a.light};color:${a.dark};">${esc(a.label)}</span>${roleLabel}</div><p style="font-size:13px;font-weight:500;margin-bottom:2px;">${esc(node.title)}</p>${node.desc?`<p style="font-size:12px;color:var(--t2);">${esc(node.desc)}</p>`:""}</div></div>`;
      nextIds.filter(Boolean).forEach(nid=>{h+=renderNode(byId[nid])});
    }else if(node.type==="decision"){
      if(interactive){
        const selectedBranch=flowBranchSelection[node.id];
        h+=`<div class="node"><div class="ncol"><div class="nd" style="background:${a.color};"><span>?</span></div></div><div class="ncn"><div><span class="al" style="background:${a.light};color:${a.dark};">${esc(a.label)} · Decisión</span>${roleLabel}</div><p style="font-size:13px;font-weight:500;margin-bottom:8px;">${esc(node.title)}</p><p style="font-size:11px;color:var(--t2);margin-bottom:8px;font-style:italic;">Haz clic en una opción para ver su flujo</p><div class="branches">${(node.branches||[]).map((b,i)=>{const clr=i===0?BRAND.primary:i===1?"#254671":i===2?"#4A6FA5":"#5A7FB5";const isActive=selectedBranch===i;return`<div class="branch branch-interactive" style="border-left-color:${clr};${isActive?`background:${clr}15;border-color:${clr};`:''}" onclick="selectBranch('${node.id}',${i})"><div><div class="bh" style="color:${clr};">${isActive?'✓ ':'→ '}${esc(b.label)}</div><div class="bt">${b.next?(byId[b.next].type==="end"?`Fin: ${esc(byId[b.next].title||"")}`:`Ver flujo →`):"Fin"}</div></div><div class="branch-arrow" style="color:${clr};">${isActive?'▼':'▸'}</div></div>`}).join("")}</div></div></div>`;

        // Solo renderizar la rama seleccionada
        if(selectedBranch !== undefined){
          const branch=(node.branches||[])[selectedBranch];
          if(branch && branch.next && byId[branch.next]){
            const branchColor=selectedBranch===0?BRAND.primary:selectedBranch===1?"#254671":"#4A6FA5";
            h+=`<div style="margin-left:24px;padding-left:18px;border-left:2px dashed ${branchColor}66;padding-top:8px;padding-bottom:4px;">`;
            h+=`<div style="font-size:11px;color:${branchColor};font-weight:600;margin-bottom:8px;">CONTINÚA CON "${esc(branch.label).toUpperCase()}"</div>`;
            h+=renderNode(byId[branch.next]);
            h+=`</div>`;
          }
        }
      }else{
        // Modo no interactivo (para descargas): muestra todas las ramas
        h+=`<div class="node"><div class="ncol"><div class="nd" style="background:${a.color};"><span>?</span></div></div><div class="ncn"><div><span class="al" style="background:${a.light};color:${a.dark};">${esc(a.label)} · Decisión</span>${roleLabel}</div><p style="font-size:13px;font-weight:500;margin-bottom:6px;">${esc(node.title)}</p><div class="branches">${(node.branches||[]).map((b,i)=>{const clr=i===0?BRAND.primary:"#254671";return`<div class="branch" style="border-left-color:${clr};cursor:default;"><div class="bh" style="color:${clr};">→ ${esc(b.label)}</div><div class="bt">${b.next?(byId[b.next].type==="end"?`Fin: ${esc(byId[b.next].title||"")}`:`Paso ${getStepIndex(b.next)}: ${esc(byId[b.next].title)}`):"Fin"}</div></div>`}).join("")}</div></div></div>`;
        (node.branches||[]).forEach(b=>{if(b.next)h+=renderNode(byId[b.next])});
      }
    }else if(node.type==="end"){
      h+=`<div class="node"><div class="ncol"><div class="ne" style="border-color:${a.color};color:${a.color};">FIN</div></div><div class="ncn"><div><span class="al" style="background:${a.light};color:${a.dark};">${esc(a.label)}</span>${roleLabel}</div><p style="font-size:13px;font-weight:500;">${esc(node.title||"Fin")}</p></div></div>`;
    }

    return h;
  }

  html+=renderNode(nodes[0]);
  // En modo interactivo no renderizamos huérfanos (las ramas no seleccionadas)
  if(!interactive){
    nodes.forEach(n=>{if(!rendered.has(n.id))html+=renderNode(n);});
  }
  html+="</div>";
  return html;
}

function selectBranch(nodeId, branchIdx){
  // Si ya está seleccionada, deseleccionar (toggle)
  if(flowBranchSelection[nodeId] === branchIdx){
    delete flowBranchSelection[nodeId];
  }else{
    flowBranchSelection[nodeId] = branchIdx;
  }
  render();
}

function doCoverLogin(){
  const u=(document.getElementById("coverUser")||{}).value?.trim()||"";
  const p=(document.getElementById("coverPass")||{}).value||"";
  if(USERS.length===0){
    state.loginError="Cargando usuarios, espera un momento e intenta de nuevo...";
    render();return;
  }
  const found=USERS.find(a=>a.user===u&&a.pass===p);
  if(found){
    state.currentUser={name:found.name,role:found.role,isAdmin:!!found.isAdmin,areaIds:found.areaIds||null};
    state.loginError="";
    state.screen="portada";
  }else{
    state.loginError="Usuario o contraseña incorrectos";
  }
  render();
}

const PHASES=[

  {id:"completada",label:"Completada",color:"#1b6b1b"},
  {id:"rechazada",label:"Rechazada",color:"#C62828"},

function getPhase(id){return PHASES.find(p=>p.id===id)||PHASES[0]}

  return`${renderAdminBar()}${renderMini()}
    <div class="fh" style="background:${BRAND.primary};">

async function updateProposalTracking(id,field,value){
  const pr=state.proposals.find(p=>p.id===id);if(!pr)return;
  if(!pr.tracking)pr.tracking={phase:"recibida",meetings:[],involvedPersons:[],notes:"",targetDate:"",evaluationNotes:"",minutas:[]};
  pr.tracking[field]=value;
  await dbSaveProposal(pr);
  if(field==="phase")render();
}

async function saveInvolved(id,value){
  const pr=state.proposals.find(p=>p.id===id);if(!pr)return;
  if(!pr.tracking)pr.tracking={phase:"recibida",meetings:[],involvedPersons:[],notes:"",targetDate:"",evaluationNotes:"",minutas:[]};
  pr.tracking.involvedPersons=value.split(",").map(s=>s.trim()).filter(Boolean);
  await dbSaveProposal(pr);
}

async function addMeeting(id){
  const pr=state.proposals.find(p=>p.id===id);if(!pr)return;
  if(!pr.tracking)pr.tracking={phase:"recibida",meetings:[],involvedPersons:[],notes:"",targetDate:"",evaluationNotes:"",minutas:[]};
  const title=document.getElementById("mtgTitle")?.value?.trim()||"";
  const date=document.getElementById("mtgDate")?.value||TODAY;
  const attendees=document.getElementById("mtgAttendees")?.value?.trim()||"";
  const notes=document.getElementById("mtgNotes")?.value?.trim()||"";
  if(!title){alert("Por favor ingresa un título para la reunión.");return}
  pr.tracking.meetings=[...(pr.tracking.meetings||[]),{title,date,attendees,notes}];
  await dbSaveProposal(pr);
  render();
}

async function removeMeeting(id,idx){
  const pr=state.proposals.find(p=>p.id===id);if(!pr||!pr.tracking)return;
  pr.tracking.meetings.splice(idx,1);
  await dbSaveProposal(pr);
  render();
}

async function addMinuta(id){
  const pr=state.proposals.find(p=>p.id===id);if(!pr)return;
  if(!pr.tracking)pr.tracking={phase:"recibida",meetings:[],involvedPersons:[],notes:"",targetDate:"",evaluationNotes:"",minutas:[]};
  const title=document.getElementById("minTitle")?.value?.trim()||"";
  const date=document.getElementById("minDate")?.value||TODAY;
  const content=document.getElementById("minContent")?.value?.trim()||"";
  if(!title){alert("Por favor ingresa un título para la minuta.");return}
  pr.tracking.minutas=[...(pr.tracking.minutas||[]),{title,date,content}];
  await dbSaveProposal(pr);
  render();
}

async function removeMinuta(id,idx){
  const pr=state.proposals.find(p=>p.id===id);if(!pr||!pr.tracking)return;
  pr.tracking.minutas.splice(idx,1);
  await dbSaveProposal(pr);
  render();
}

  const flow=p.nodes&&p.nodes.length>0?`<div class="card" style="margin-bottom:12px;"><p class="lbl" style="color:${ma.color};">FLUJO DEL PROCESO</p>${renderFlow(p.nodes)}</div>`:"";
  const crit=p.criticos.length===0?"":`<div class="cc"><p class="lbl" style="color:var(--dd);display:flex;align-items:center;gap:6px;"><span>⚠</span>PUNTOS CRÍTICOS</p>${p.criticos.map(c=>`<div class="ci"><span class="cii">!</span><span>${esc(c)}</span></div>`).join("")}</div>`;
  const docs=p.docs.length===0?"":`<div class="card" style="margin-bottom:12px;"><p class="lbl" style="color:${ma.color};">DOCUMENTOS RELACIONADOS</p><div style="display:flex;flex-direction:column;gap:6px;">${p.docs.map(d=>{
    // Soporta ambos formatos (string antiguo y objeto nuevo)
    const docObj=typeof d==="string"?{name:d,area:null,link:null,file:null}:d;
    const docArea=docObj.area?getArea(docObj.area):null;
    // Si el doc guardado no tiene link, buscarlo en el catálogo actual (por si se agregó después)
    const catalogRef=state.catalog.find(c=>c.name===docObj.name);
    const docLink=docObj.link||(docObj.file?{url:docObj.file.url||'#',name:docObj.file.name||docObj.name}:null)
                 ||(catalogRef?.link)||(catalogRef?.file?{url:catalogRef.file.url||'#',name:catalogRef.file.name||catalogRef.name}:null);
    return`<div class="doc-with-area"><div style="flex:1;min-width:0;"><p style="font-size:13px;font-weight:500;margin-bottom:2px;">📄 ${esc(docObj.name)}</p>${docLink?`<a href="${esc(docLink.url)}" target="_blank" rel="noreferrer" class="doc-file-link">🔗 ${esc(docLink.name||'Abrir documento')}</a>`:''}</div>${docArea?`<span class="doc-area-tag" style="background:${docArea.light};color:${docArea.dark};">${esc(docArea.label)}</span>`:''}</div>`;
  }).join("")}</div></div>`;
  function renderMediaItem(m){
    const isYT=m.url&&(m.url.includes("youtube.com")||m.url.includes("youtu.be"));
    const isVimeo=m.url&&m.url.includes("vimeo.com");
    const isDriveAudio=m.url&&m.url.includes("drive.google.com")&&m.type==="audio";
    const isDriveVideo=m.url&&m.url.includes("drive.google.com")&&m.type==="video";
    let embedId="";
    if(isYT){
      const match=m.url.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
      if(match)embedId=match[1];
    }
    if(isVimeo){
      const match=m.url.match(/vimeo\.com\/(\d+)/);
      if(match)embedId=match[1];
    }
    let player="";
    if(m.type==="audio"){
      if(isDriveAudio){
        // Google Drive audio embed
        const fileId=m.url.match(/\/d\/([^/]+)/)?.[1]||m.url.match(/id=([^&]+)/)?.[1];
        const embedUrl=fileId?`https://drive.google.com/file/d/${fileId}/preview`:"";
        player=embedUrl?`<iframe src="${esc(embedUrl)}" style="width:100%;height:80px;border:none;border-radius:8px;margin-top:6px;" allow="autoplay"></iframe>`
          :`<audio controls style="width:100%;margin-top:6px;"><source src="${esc(m.url)}"><a href="${esc(m.url)}" target="_blank">Abrir audio</a></audio>`;
      } else {
        player=`<audio controls style="width:100%;margin-top:6px;border-radius:8px;"><source src="${esc(m.url)}"><p style="font-size:11px;color:var(--t2);"><a href="${esc(m.url)}" target="_blank">Abrir audio →</a></p></audio>`;
      }
    } else if(m.type==="video"){
      if(isYT&&embedId){
        player=`<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin-top:8px;"><iframe src="https://www.youtube.com/embed/${esc(embedId)}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div>`;
      } else if(isVimeo&&embedId){
        player=`<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin-top:8px;"><iframe src="https://player.vimeo.com/video/${esc(embedId)}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>`;
      } else if(isDriveVideo){
        const fileId=m.url.match(/\/d\/([^/]+)/)?.[1]||m.url.match(/id=([^&]+)/)?.[1];
        const embedUrl=fileId?`https://drive.google.com/file/d/${fileId}/preview`:"";
        player=embedUrl?`<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin-top:8px;"><iframe src="${esc(embedUrl)}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allow="autoplay" allowfullscreen></iframe></div>`
          :`<video controls style="width:100%;border-radius:8px;margin-top:6px;"><source src="${esc(m.url)}"><a href="${esc(m.url)}" target="_blank">Abrir video</a></video>`;
      } else {
        player=`<video controls style="width:100%;border-radius:8px;margin-top:6px;"><source src="${esc(m.url)}"><p style="font-size:11px;color:var(--t2);"><a href="${esc(m.url)}" target="_blank">Abrir video →</a></p></video>`;
      }
    } else {
      // link / imagen
      player=`<a href="${esc(m.url)}" target="_blank" rel="noreferrer" style="font-size:12px;color:var(--p);display:inline-flex;align-items:center;gap:4px;margin-top:4px;">🔗 ${esc(m.url)}</a>`;
    }
    return`<div style="background:var(--su2);border-radius:10px;padding:12px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span style="font-size:16px;">${mediaIcon(m.type)}</span>
        <p style="font-size:13px;font-weight:500;">${esc(m.label)}</p>
        <span style="font-size:10px;color:var(--t3);background:var(--pl);padding:1px 7px;border-radius:20px;text-transform:uppercase;">${m.type==="audio"?"Audio":m.type==="video"?"Video":"Link"}</span>
      </div>
      ${player}
    </div>`;
  }
  const media=p.media.length===0?"":`<div class="card" style="margin-bottom:12px;"><p class="lbl" style="color:${ma.color};">🎬 RECURSOS MULTIMEDIA</p>${p.media.map(renderMediaItem).join("")}</div>`;
  return`${renderAdminBar()}${renderMini()}<div class="fh" style="background:${ma.color};"><div class="fhr"><div><p style="font-size:11px;color:rgba(255,255,255,.7);margin-bottom:4px;">FICHA DE PROCESO</p><h2 style="font-size:19px;margin-bottom:6px;">${esc(p.title)}</h2><div>${chips}</div></div><span style="font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap;">Act. ${fmtDate(p.updatedAt)}</span></div></div><div class="fg"><div class="card"><p class="lbl" style="color:${ma.color};">OBJETIVO</p><p style="font-size:13px;line-height:1.5;">${p.objetivo?esc(p.objetivo):'<em style="color:var(--t2);">Sin definir</em>'}</p></div><div class="card" style="background:${ma.light};border-color:${ma.color}33;"><p class="lbl" style="color:${ma.color};">BENEFICIO</p><p style="font-size:13px;color:${ma.dark};line-height:1.5;">${p.beneficio?esc(p.beneficio):`<em style="color:${ma.color};">Sin definir</em>`}</p></div></div>${flow}${crit}${docs}${media}<div class="nr"><button class="btn" onclick="goArea('${ma.id}')">← ${esc(ma.label)}</button><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn" onclick="downloadProcess('${p.id}')">⬇ Descargar</button><button class="btn" onclick="go('history')">📋 Historial (${(p.history||[]).length})</button>${isAdmin?`<button class="btn ba" onclick="startEdit('${p.id}')">Editar</button>`:""}${isAdmin?`<button class="bd" onclick="confirmDelete('${p.id}')">🗑 Eliminar</button>`:""}</div></div>`;
}

function renderHistory(){
  const p=getProcess(state.activeProcessId);if(!p)return"";
  const a=getArea(p.areas[0]);
  const hist=[...(p.history||[])].reverse();
  const content=hist.length===0?`<div class="card" style="text-align:center;color:var(--t2);font-size:13px;padding:24px;">Aún no hay registros de cambios.</div>`:`<div class="card" style="padding:4px 0;">${hist.map(h=>`<div class="hi"><div class="av" style="background:${a.light};color:${a.color};">${h.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div><div style="flex:1;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:8px;"><p style="font-size:14px;font-weight:500;">${esc(h.name)}</p><span style="font-size:12px;color:var(--t2);white-space:nowrap;">${fmtDate(h.date)}</span></div><p style="font-size:12px;color:var(--t2);margin-bottom:4px;">${esc(h.role)}</p><span class="ha" style="background:${a.light};color:${a.dark};">${esc(h.action)}</span></div></div>`).join("")}</div>`;
  return`${renderAdminBar()}${renderMini()}<div class="fh" style="background:${a.color};"><p style="font-size:11px;color:rgba(255,255,255,.7);margin-bottom:4px;">HISTORIAL DE CAMBIOS</p><h2 style="font-size:18px;">${esc(p.title)}</h2></div>${content}<div class="nr" style="justify-content:flex-start;"><button class="btn" onclick="go('ficha')">← Volver a la ficha</button></div>`;
}

// EDITOR simplificado con nodos
function renderEdit(){
  const e=state.editing;if(!e)return"";
  const areaBtns=AREAS.map(a=>{const sel=e.areas.includes(a.id);return`<button class="ab2 ${sel?'sel':''}" style="${sel?`background:${a.color};`:""}" onclick="toggleArea('${a.id}')">${esc(a.label)}</button>`}).join("");

  const nodesHtml=(e.nodes||[]).map((n,i)=>{
    const sa=getArea(n.area||e.areas[0]);
    const areaOpts=AREAS.map(a=>`<option value="${a.id}" ${(n.area||e.areas[0])===a.id?'selected':''}>${esc(a.label)}</option>`).join("");
    const typeOpts=`<option value="step" ${n.type==="step"?'selected':''}>Paso</option><option value="decision" ${n.type==="decision"?'selected':''}>Decisión</option><option value="end" ${n.type==="end"?'selected':''}>Fin</option>`;

    let typeSpecific="";
    if(n.type==="step"){
      const nextId=(n.next||[])[0]||"";
      typeSpecific=`<input value="${esc(n.desc||'')}" placeholder="Descripción del paso" onchange="updateNode(${i},'desc',this.value)" style="margin-bottom:6px;"><label style="font-size:11px;color:var(--t2);">Siguiente nodo:</label><select onchange="updateNodeNext(${i},this.value)" style="margin-bottom:0;"><option value="">— Ninguno (fin) —</option>${e.nodes.filter(x=>x.id!==n.id).map(x=>`<option value="${x.id}" ${nextId===x.id?'selected':''}>${esc(x.title||x.id)}</option>`).join("")}</select>`;
    }else if(n.type==="decision"){
      const branches=n.branches||[];
      typeSpecific=`${branches.map((b,bi)=>`<div style="display:flex;gap:6px;margin-bottom:4px;align-items:center;"><input value="${esc(b.label)}" placeholder="Etiqueta (SÍ/NO)" onchange="updateBranch(${i},${bi},'label',this.value)" style="flex:1;margin-bottom:0;"><select onchange="updateBranch(${i},${bi},'next',this.value)" style="flex:2;margin-bottom:0;"><option value="">— Fin —</option>${e.nodes.filter(x=>x.id!==n.id).map(x=>`<option value="${x.id}" ${b.next===x.id?'selected':''}>${esc(x.title||x.id)}</option>`).join("")}</select><button class="bd" onclick="removeBranch(${i},${bi})">✕</button></div>`).join("")}<button class="btn bs" style="margin-top:4px;" onclick="addBranch(${i})">+ Rama</button>`;
    }

    const canMoveUp = i > 0;
    const canMoveDown = i < e.nodes.length - 1;

    return`<div class="edit-node">
      <div class="move-btns">
        <button class="move-btn" onclick="moveNode(${i},-1)" ${!canMoveUp?'disabled':''} title="Mover arriba">▲</button>
        <button class="move-btn" onclick="moveNode(${i},1)" ${!canMoveDown?'disabled':''} title="Mover abajo">▼</button>
      </div>
      <div class="nn" style="background:${sa.color};margin-top:4px;">${i+1}</div>
      <div style="flex:1;">
        <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;">
          <select onchange="updateNode(${i},'type',this.value)" style="width:auto;margin-bottom:0;">${typeOpts}</select>
          <input value="${esc(n.title||'')}" placeholder="Título" onchange="updateNode(${i},'title',this.value)" style="flex:1;min-width:120px;margin-bottom:0;">
          <select onchange="updateNode(${i},'area',this.value)" style="width:auto;margin-bottom:0;">${areaOpts}</select>
        </div>
        <input value="${esc(n.role||'')}" placeholder="Cargo responsable (ej: Jefe de ventas)" onchange="updateNode(${i},'role',this.value)" style="margin-bottom:6px;">
        ${typeSpecific}
      </div>
      <button class="bd" onclick="removeNode(${i})" style="margin-top:4px;">✕</button>
    </div>`;
  }).join("");

  const crit=e.criticos.map((c,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;"><p style="flex:1;font-size:13px;">${esc(c)}</p><button class="bd" onclick="removeCritico(${i})">✕</button></div>`).join("");

  // Docs con área y archivo
  const docs=e.docs.map((d,i)=>{
    const docObj=typeof d==="string"?{name:d,area:null,file:null}:d;
    const da=docObj.area?getArea(docObj.area):null;
    return`<div class="doc-with-area"><div style="flex:1;min-width:0;"><p style="font-size:13px;font-weight:500;">📄 ${esc(docObj.name)}</p>${docObj.file?`<p style="font-size:11px;color:var(--p);">⬇ ${esc(docObj.file.name)}</p>`:''}</div>${da?`<span class="doc-area-tag" style="background:${da.light};color:${da.dark};">${esc(da.label)}</span>`:''}<button class="bd" onclick="removeDoc(${i})">✕</button></div>`;
  }).join("");

  const media=e.media.map((m,i)=>`<div style="display:flex;align-items:center;gap:10px;background:var(--su2);border-radius:8px;padding:8px 12px;margin-bottom:6px;">
    <span style="font-size:16px;flex-shrink:0;">${mediaIcon(m.type)}</span>
    <div style="flex:1;min-width:0;">
      <p style="font-size:13px;font-weight:500;margin-bottom:1px;">${esc(m.label)}</p>
      <p style="font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(m.url)}</p>
    </div>
    <span style="font-size:10px;color:var(--t3);background:var(--pl);padding:1px 7px;border-radius:20px;text-transform:uppercase;flex-shrink:0;">${m.type}</span>
    <button class="bd" onclick="removeMedia(${i})" style="flex-shrink:0;">✕</button>
  </div>`).join("");

  return`${renderAdminBar()}${renderMini()}<div class="fh" style="background:${BRAND.primary};"><p style="font-size:11px;color:rgba(255,255,255,.7);margin-bottom:3px;">EDITANDO FICHA</p><h2 style="font-size:18px;">${esc(e.title)||'Nueva ficha'}</h2></div><div class="card" style="margin-bottom:10px;"><p class="lbl" style="color:${BRAND.primary};">NOMBRE DEL PROCESO</p><input value="${esc(e.title)}" placeholder="Nombre..." onchange="updateField('title',this.value)" style="margin-bottom:0;"></div><div class="card" style="margin-bottom:10px;"><p class="lbl" style="color:${BRAND.primary};">ÁREAS PARTICIPANTES</p><div style="display:flex;gap:8px;flex-wrap:wrap;">${areaBtns}</div></div><div class="fg"><div class="card"><p class="lbl" style="color:${BRAND.primary};">OBJETIVO</p><textarea placeholder="¿Qué se busca lograr?" onchange="updateField('objetivo',this.value)">${esc(e.objetivo)}</textarea></div><div class="card"><p class="lbl" style="color:${BRAND.primary};">BENEFICIO</p><textarea placeholder="¿Por qué se hace?" onchange="updateField('beneficio',this.value)">${esc(e.beneficio)}</textarea></div></div><div class="card" style="margin-bottom:10px;"><p class="lbl" style="color:${BRAND.primary};">FLUJO · pasos, decisiones y fines</p><p style="font-size:11px;color:var(--t2);margin-bottom:10px;">Usa las flechas ▲▼ para reordenar. Cada nodo puede indicar el cargo responsable.</p>${nodesHtml}<button class="btn bs" onclick="addNode()">+ Agregar nodo</button></div><div class="card cc" style="margin-bottom:10px;"><p class="lbl" style="color:var(--dd);">⚠ PUNTOS CRÍTICOS</p>${crit}<div style="display:flex;gap:8px;"><input id="newCritico" placeholder="Agregar punto crítico..." style="flex:1;margin-bottom:0;" onkeydown="if(event.key==='Enter')addCritico()"><button class="btn bs" onclick="addCritico()">+ Agregar</button></div></div><div class="card" style="margin-bottom:10px;"><p class="lbl" style="color:${BRAND.primary};">DOCUMENTOS RELACIONADOS</p><div style="margin-bottom:8px;">${docs}</div><button class="btn bs" onclick="openDocSelector()">📋 Seleccionar del catálogo</button></div><div class="card" style="margin-bottom:10px;"><p class="lbl" style="color:${BRAND.primary};">RECURSOS Y EJEMPLOS</p>${media}<div style="background:var(--pl);border-radius:8px;padding:12px;margin-top:4px;">
  <p style="font-size:12px;font-weight:500;color:${BRAND.primary};margin-bottom:8px;">+ Agregar recurso multimedia</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
    <div>
      <p class="lbl" style="color:${BRAND.primary};">TIPO</p>
      <select id="newMediaType" style="margin-bottom:0;" onchange="updateMediaHint(this.value)">
        <option value="audio">🔊 Audio</option>
        <option value="video">▶️ Video</option>
        <option value="link">🔗 Link</option>
      </select>
    </div>
    <div>
      <p class="lbl" style="color:${BRAND.primary};">NOMBRE</p>
      <input id="newMediaLabel" placeholder="Ej: Narración del proceso" style="margin-bottom:0;">
    </div>
  </div>
  <p class="lbl" style="color:${BRAND.primary};">URL DEL RECURSO</p>
  <input id="newMediaUrl" placeholder="https://..." style="margin-bottom:4px;">
  <p id="mediaHint" style="font-size:11px;color:var(--t2);margin-bottom:8px;">Para audio o video en Google Drive: abre el archivo, clic en los 3 puntos → "Obtener enlace" → cambia a "Cualquier persona con el enlace".</p>
  <button class="btn bp" style="width:100%;" onclick="addMedia()">+ Agregar recurso</button>
</div></div><div class="nr"><button class="btn" onclick="cancelEdit()">← Cancelar</button><button class="btn ba" onclick="saveEdit()">Guardar ficha</button></div>`;
}

function renderProposals(){
  const ad=!!state.currentUser;
  // Filtrar según permisos: admin ve todo, usuario normal solo ve pendientes y aprobadas (nunca rechazadas)
  const visibleProposals = ad ? state.proposals : state.proposals.filter(p => p.status !== "rejected");
  const pending=visibleProposals.filter(p=>p.status==="pending");
  const reviewed=visibleProposals.filter(p=>p.status!=="pending");

  const rp=pr=>{const a=getArea(pr.area);const sc=pr.status==="pending"?"pp":pr.status==="approved"?"pa":"pr";
    const st=pr.status==="pending"?(ad?"Pendiente":"En evaluación"):pr.status==="approved"?"Aceptada":"Rechazada";
    const spClass = pr.status==="pending"?"sp spp":pr.status==="approved"?"sp spa":"sp spr";

async function updateAreaField(i,f,v){

async function updateAreaColor(i,color){
  AREAS[i].color=color;
  AREAS[i].light=hexToLight(color);
  AREAS[i].dark=hexToDark(color);
  await dbSaveArea(AREAS[i],i);
  render();
}
function hexToLight(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mix=(c)=>Math.round(c+(255-c)*0.88);
  return`#${mix(r).toString(16).padStart(2,'0')}${mix(g).toString(16).padStart(2,'0')}${mix(b).toString(16).padStart(2,'0')}`;
}
function hexToDark(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const dark=(c)=>Math.round(c*0.6);
  return`#${dark(r).toString(16).padStart(2,'0')}${dark(g).toString(16).padStart(2,'0')}${dark(b).toString(16).padStart(2,'0')}`;
}

}
async function confirmDeleteArea(i){

}

async function saveCatalogDocEditor(){
  const name=document.getElementById('catalogDocName').value.trim();
  const area=document.getElementById('catalogDocArea').value;
  const linkInput=document.getElementById('catalogDocLink');
  const linkLabel=document.getElementById('catalogDocLinkLabel');
  const index=state.modal?.data?.index;

  if(!name){alert('Por favor ingresa el nombre del documento.');return}
  if(state.catalog.some((d,i)=>d.name===name && i!==index)){
    alert('Ya existe un documento con ese nombre.');
    return;
  }
  // Manejar link
  let linkData=currentDoc?.link||null;
  const newUrl=linkInput?linkInput.value.trim():'';
  const newLabel=linkLabel?linkLabel.value.trim():'';
  if(newUrl){
    linkData={url:normalizeLinkUrl(newUrl),name:newLabel||name};

  // Compatibilidad con registros antiguos que tenían file

  render();

// ============ RENDER ============
function render(){
  const s=state.screen;
  const map={cover:renderCover,portada:renderPortada,area:renderArea,ficha:renderFicha,history:renderHistory,login:renderLogin,edit:renderEdit,proposals:renderProposals,manual:renderManual,areaManager:renderAreaManager,catalogManager:renderCatalogManager,compliance:renderCompliance,proposalDetail:renderProposalDetail,userManager:renderUserManager};
  const currentScroll=window.scrollY||document.documentElement.scrollTop||0;
  document.getElementById("app").innerHTML=(map[s]||renderPortada)();
  document.getElementById("modal").innerHTML=renderModal();
  window.scrollTo(0,currentScroll);
}

// ============ ACCIONES ============
function go(s){state.screen=s;render()}
function goArea(id){state.activeAreaId=id;state.screen="area";render()}
function goFicha(id){state.activeProcessId=id;state.screen="ficha";flowBranchSelection={};render()}

function startEdit(id){
  if(!isAdminUser()){state.screen="login";render();return}
  const p=getProcess(id);
  state.editing=JSON.parse(JSON.stringify(p));
  if(!state.editing.nodes)state.editing.nodes=[];
  state.screen="edit";render();
}

function addProcess(){
  if(!isAdminUser()){state.screen="login";render();return}
  state.editing={id:"p"+Date.now(),title:"",areas:[state.activeAreaId||"ventas"],updatedAt:TODAY,objetivo:"",beneficio:"",nodes:[],criticos:[],docs:[],media:[],history:[],position:state.processes.length};
  state.activeProcessId=null;state.screen="edit";render();
}

function cancelEdit(){state.screen=state.activeProcessId?"ficha":"area";state.editing=null;render()}

async function saveEdit(){
  const e=state.editing;
  if(!e.title.trim()){alert("El proceso debe tener un nombre.");return}
  const isNew=!state.processes.find(p=>p.id===e.id);
  const entry={date:TODAY,name:state.currentUser.name,role:state.currentUser.role,action:isNew?"Creación del proceso":"Actualización del proceso"};
  const upd={...e,updatedAt:TODAY,history:[...(e.history||[]),entry],position:e.position!=null?e.position:state.processes.length};
  await dbSaveProcess(upd);
  if(isNew)state.processes.push(upd);
  else{const i=state.processes.findIndex(p=>p.id===upd.id);state.processes[i]=upd}
  normalizeProcesses();
  state.activeProcessId=upd.id;state.screen="ficha";state.editing=null;render();
}

function confirmDelete(id){state.modal={type:"delete",data:{id}};render()}
async function deleteProcess(id){
  await dbDeleteProcess(id);
  state.processes=state.processes.filter(p=>p.id!==id);
  state.modal=null;state.activeProcessId=null;
  state.screen=state.activeAreaId?"area":"portada";render();
}

async function doLogin(){
  const u=document.getElementById("loginUser").value.trim();
  const p=document.getElementById("loginPass").value;
  if(USERS.length===0){state.loginError="Cargando usuarios, espera un momento...";render();return;}
  const found=USERS.find(a=>a.user===u&&a.pass===p);
  if(found){
    state.currentUser={name:found.name,role:found.role,isAdmin:!!found.isAdmin,areaIds:found.areaIds||null};
    state.loginError="";
    state.screen="portada";
  }else{
    state.loginError="Usuario o contraseña incorrectos";
  }
  render();
}
async function doLogout(){
  state.currentUser=null;
  state.loginError="";
  state.screen="cover";
  render();
}

// EDITOR helpers
function updateField(f,v){state.editing[f]=v}
function toggleArea(id){
  const sel=state.editing.areas.includes(id);
  if(sel){if(state.editing.areas.length>1)state.editing.areas=state.editing.areas.filter(x=>x!==id)}
  else state.editing.areas=[...state.editing.areas,id];
  render();
}
function addNode(){
  const id="n"+Date.now();
  state.editing.nodes.push({id,type:"step",area:state.editing.areas[0],role:"",title:"Nuevo paso",desc:"",next:[]});
  render();
}
function moveNode(i,dir){
  const arr=state.editing.nodes;
  const j=i+dir;
  if(j<0||j>=arr.length)return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  render();
}
function removeNode(i){
  const id=state.editing.nodes[i].id;
  state.editing.nodes.splice(i,1);
  state.editing.nodes.forEach(n=>{
    if(n.next)n.next=n.next.filter(x=>x!==id);
    if(n.branches)n.branches.forEach(b=>{if(b.next===id)b.next=""});
  });
  render();
}
function updateNode(i,f,v){
  const n=state.editing.nodes[i];
  n[f]=v;
  if(f==="type"){
    if(v==="decision"){n.branches=n.branches||[{label:"SÍ",next:""},{label:"NO",next:""}];delete n.next;delete n.desc}
    else if(v==="step"){n.next=n.next||[];delete n.branches}
    else if(v==="end"){delete n.next;delete n.branches;delete n.desc}
  }
  render();
}
function updateNodeNext(i,v){state.editing.nodes[i].next=v?[v]:[];render()}
function updateBranch(i,bi,f,v){state.editing.nodes[i].branches[bi][f]=v;render()}
function addBranch(i){state.editing.nodes[i].branches=state.editing.nodes[i].branches||[];state.editing.nodes[i].branches.push({label:"Opción",next:""});render()}
function removeBranch(i,bi){state.editing.nodes[i].branches.splice(bi,1);render()}
function removeCritico(i){state.editing.criticos.splice(i,1);render()}
function addCritico(){const v=document.getElementById("newCritico").value;if(!v)return;state.editing.criticos.push(v);render()}
function removeDoc(i){state.editing.docs.splice(i,1);render()}
function removeMedia(i){state.editing.media.splice(i,1);render()}
function updateMediaHint(type){
  const el=document.getElementById("mediaHint");
  if(!el)return;
  const hints={
    audio:'Para audio en Google Drive: abre el archivo → clic en los 3 puntos → "Obtener enlace" → "Cualquier persona". También puedes pegar un link directo a un .mp3.',
    video:'Para YouTube: copia la URL del video (ej: https://youtu.be/xyz). Para Google Drive: abre el video → "Obtener enlace" → "Cualquier persona con el enlace".',
    link:'Pega cualquier URL pública: página web, PDF, documento de Google, etc.'
  };
  el.textContent=hints[type]||hints.link;
}
function addMedia(){
  const type=document.getElementById("newMediaType").value;
  const label=document.getElementById("newMediaLabel").value.trim();
  const url=document.getElementById("newMediaUrl").value.trim();
  if(!label){alert("Por favor ingresa un nombre para el recurso.");return}
  if(!url){alert("Por favor ingresa la URL del recurso.");return}
  state.editing.media.push({type,label,url});render();
}

// Doc selector
function openDocSelector(){state.modal={type:"docSelector"};render()}
function toggleDoc(name){
  const currentNames=state.editing.docs.map(d=>typeof d==="string"?d:d.name);
  const i=currentNames.indexOf(name);
  if(i>=0){
    state.editing.docs.splice(i,1);
  }else{
    // Buscar el doc completo en el catálogo
    const catalogDoc=state.catalog.find(d=>d.name===name);
    if(catalogDoc){
      state.editing.docs.push({name:catalogDoc.name,area:catalogDoc.area,link:catalogDoc.link||null,file:catalogDoc.file||null});
    }else{
      state.editing.docs.push({name,area:null,link:null,file:null});
    }
  }
  render();
}
function openAddCatalogDoc(){
  state.modal={type:"addCatalogDoc"};render();
}
async function addCatalogDocWithFile(){
  const name=document.getElementById("catDocName").value.trim();
  const area=document.getElementById("catDocArea").value;
  const fileInput=document.getElementById("catDocFile");
  if(!name){alert("Por favor ingresa el nombre del documento.");return}
  if(state.catalog.find(d=>d.name===name)){alert("Ya existe un documento con ese nombre.");return}

  let fileData=null;
  if(fileInput.files&&fileInput.files[0]){
    fileData=await dbUploadFile(fileInput.files[0]);
  }

  const newDoc={name,area,file:fileData};
  const saved=await dbSaveCatalogDoc(newDoc);
  state.catalog.push(saved);
  state.modal={type:"docSelector"};
  render();
}

// Modal
function closeModal(e){if(e&&e.target!==e.currentTarget)return;state.modal=null;render()}

// Propuestas
function openProposalForm(){state.modal={type:"proposal"};render()}
async function submitProposal(){
  const type=document.getElementById("prType").value;
  const area=document.getElementById("prArea").value;
  const title=document.getElementById("prTitle").value.trim();
  const description=document.getElementById("prDesc").value.trim();
  const author=document.getElementById("prAuthor").value.trim();

  const newProposal={id:"pr"+Date.now(),type,area,title,description,author,role:"",date:TODAY,status:"pending",
    tracking:{phase:"recibida",meetings:[],involvedPersons:[],notes:"",targetDate:"",evaluationNotes:"",minutas:[]}};
  await dbSaveProposal(newProposal);
  state.proposals.unshift(newProposal);
  state.modal=null;render();
}
async function updateProposalStatus(id,status){
  const pr=state.proposals.find(p=>p.id===id);
  if(pr){
    pr.status=status;
    await dbSaveProposal(pr);
  }
  render();
}

// Versión simplificada para Word (sin display flex, usa tablas)
function processToWordHTML(p){
  const ma=getArea(p.areas[0]);
  const chips=p.areas.map(aid=>esc(getArea(aid).label)).join(", ");
  const byId={};(p.nodes||[]).forEach(n=>byId[n.id]=n);
  let idx=0;const indices={};
  function walkIdx(n){if(!n||indices[n.id])return;if(n.type==="step"){idx++;indices[n.id]=idx}const nexts=n.type==="decision"?(n.branches||[]).map(b=>b.next):(n.next||[]);nexts.filter(Boolean).forEach(id=>walkIdx(byId[id]))}
  if(p.nodes&&p.nodes[0])walkIdx(p.nodes[0]);

  const flowRows=(p.nodes||[]).map(n=>{
    const a=getArea(n.area);
    const roleText=n.role?` · ${esc(n.role)}`:"";
    if(n.type==="step"){
      return`<tr><td style="background:${a.color};color:#fff;font-weight:bold;padding:6px;text-align:center;width:40px;">${indices[n.id]||"·"}</td><td style="padding:6px;background:${a.light};border-left:3px solid ${a.color};"><b>[${esc(a.label)}${roleText}]</b> ${esc(n.title)}<br><span style="color:#555;font-size:11px;">${esc(n.desc||"")}</span></td></tr>`;
    }else if(n.type==="decision"){
      const branches=(n.branches||[]).map(b=>{const next=byId[b.next];const nextLabel=next?(next.type==="end"?`Fin: ${esc(next.title||"")}`:`Paso ${indices[next.id]||"·"}: ${esc(next.title)}`):"Fin";return`<div>→ <b>${esc(b.label)}:</b> ${nextLabel}</div>`}).join("");
      return`<tr><td style="background:${a.color};color:#fff;font-weight:bold;padding:6px;text-align:center;">?</td><td style="padding:6px;background:${a.light};border-left:3px solid ${a.color};"><b>[${esc(a.label)} · Decisión${roleText}]</b> ${esc(n.title)}<br><span style="font-size:11px;">${branches}</span></td></tr>`;
    }else{
      return`<tr><td style="padding:6px;text-align:center;border:2px solid ${a.color};color:${a.color};font-weight:bold;">FIN</td><td style="padding:6px;background:${a.light};"><b>[${esc(a.label)}${roleText}]</b> ${esc(n.title||"Fin")}</td></tr>`;
    }
  }).join("");

  const crit=p.criticos.length===0?"":`<h3 style="color:#8B1919;margin-top:16px;">⚠ PUNTOS CRÍTICOS</h3><table style="width:100%;border-collapse:collapse;margin-bottom:12px;">${p.criticos.map(c=>`<tr><td style="background:#FDECEA;border-left:4px solid #C62828;padding:8px;color:#8B1919;">${esc(c)}</td></tr>`).join("")}</table>`;
  const docs=p.docs.length===0?"":`<h3 style="color:${ma.color};margin-top:16px;">DOCUMENTOS RELACIONADOS</h3><table style="width:100%;border-collapse:collapse;">${p.docs.map(d=>{const dObj=typeof d==="string"?{name:d,area:null}:d;const da=dObj.area?getArea(dObj.area):null;return`<tr><td style="padding:6px;">📄 ${esc(dObj.name)}</td><td style="padding:6px;text-align:right;">${da?`<span style="padding:2px 8px;background:${da.light};color:${da.dark};font-size:10px;">${esc(da.label)}</span>`:''}</td></tr>`}).join("")}</table>`;

  return`<div style="page-break-after:always;margin-bottom:30px;">
    <table style="width:100%;background:${ma.color};color:#fff;border-collapse:collapse;margin-bottom:12px;"><tr><td style="padding:14px 18px;border-left:4px solid #edcc2a;">
      <div style="font-size:11px;opacity:.8;">FICHA DE PROCESO · ${chips}</div>
      <h2 style="font-size:18px;margin:4px 0;">${esc(p.title)}</h2>
      <div style="font-size:11px;opacity:.8;">Actualizado: ${fmtDate(p.updatedAt)}</div>
    </td></tr></table>
    <h3 style="color:${ma.color};">OBJETIVO</h3><p>${esc(p.objetivo)}</p>
    <h3 style="color:${ma.color};">BENEFICIO</h3><p>${esc(p.beneficio)}</p>
    <h3 style="color:${ma.color};">FLUJO DEL PROCESO</h3>
    <table style="width:100%;border-collapse:collapse;">${flowRows}</table>
    ${crit}
    ${docs}
  </div>`;
}

function openDownloadMenu(mode,id){
  state.modal={type:"download",data:{mode,id}};
  render();
}

function downloadAsPDF(title,content){
  // Usa ventana de impresión del navegador (guarda como PDF)
  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>${esc(title)}</title><style>
    @page{size:A4;margin:15mm}
    body{font-family:-apple-system,"Segoe UI",Arial,sans-serif;max-width:100%;margin:0;padding:0;color:#2c2c2a;line-height:1.5}
    h1{color:${BRAND.primary};border-bottom:3px solid ${BRAND.accent};padding-bottom:10px;margin-bottom:20px}
    h2,h3{font-weight:500}
    .flow{padding:4px 0}
    .node{display:flex;gap:12px;align-items:flex-start;padding:8px 0;page-break-inside:avoid}
    .ncol{min-width:36px;display:flex;flex-direction:column;align-items:center}
    .nn{width:32px;height:32px;border-radius:50%;color:#fff;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center}
    .nd{width:36px;height:36px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600}
    .nd span{transform:rotate(-45deg);font-size:10px}
    .ne{width:32px;height:32px;border-radius:50%;border:2px solid;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
    .al{font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px;display:inline-block;margin-bottom:4px;text-transform:uppercase}
    .ncn{flex:1}
    .branches{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
    .branch{flex:1;min-width:180px;background:#f1efe8;padding:8px 10px;border-left:3px solid;border-radius:6px}
    .bh{font-size:11px;font-weight:600;margin-bottom:4px}
    .bt{font-size:12px;color:#5f5e5a}
    .line{display:none}
    @media print{.no-print{display:none}}
  </style></head><body>
    <div class="no-print" style="background:#1b2877;color:#fff;padding:10px;margin-bottom:15px;border-radius:6px;text-align:center;">
      <p style="margin-bottom:6px;">Para guardar como PDF: presiona <b>Ctrl+P</b> (o Cmd+P) y elige "Guardar como PDF"</p>
      <button onclick="window.print()" style="background:#edcc2a;color:#111A50;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:500;">🖨 Imprimir / Guardar PDF</button>
    </div>
    <h1>${esc(title)}</h1>
    <p style="color:#5f5e5a;font-size:12px;margin-bottom:30px;">IMAGEM · Manual de procesos · Generado el ${fmtDate(TODAY)}</p>
    ${content}
  </body></html>`;
  const w=window.open("","_blank");
  if(!w){alert("Por favor permite las ventanas emergentes para descargar el PDF.");return}
  w.document.write(html);
  w.document.close();
  setTimeout(()=>{try{w.print()}catch(e){}},500);
}

function downloadAsWord(title,content){
  // Genera un .doc que Word puede abrir
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>${esc(title)}</title><!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]--><style>
    body{font-family:Calibri,Arial,sans-serif;color:#2c2c2a;line-height:1.5}
    h1{color:${BRAND.primary};border-bottom:3px solid ${BRAND.accent};padding-bottom:10px}
    h2,h3{font-weight:500;color:${BRAND.primary}}
    table{border-collapse:collapse;width:100%}
  </style></head><body>
    <h1>${esc(title)}</h1>
    <p style="color:#5f5e5a;font-size:12px;">IMAGEM · Manual de procesos · Generado el ${fmtDate(TODAY)}</p>
    <hr>
    ${content}
  </body></html>`;
  const blob=new Blob(['\ufeff',html],{type:"application/msword"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=title.replace(/[^a-z0-9áéíóúñ ]/gi,"_")+".doc";
  a.click();
  URL.revokeObjectURL(url);
}

function doDownload(format){
  const m=state.modal.data;
  if(m.mode==="process"){
    const p=getProcess(m.id);if(!p)return;
    const title=`Proceso - ${p.title}`;
    if(format==="pdf")downloadAsPDF(title,processToHTML(p));
    else downloadAsWord(title,processToWordHTML(p));
  }else if(m.mode==="area"){
    const a=getArea(m.id);
    const list=state.processes.filter(p=>p.areas.includes(m.id));
    if(list.length===0)return;
    const title=`Procesos del área - ${a.label}`;
    if(format==="pdf")downloadAsPDF(title,list.map(processToHTML).join(""));
    else downloadAsWord(title,list.map(processToWordHTML).join("<br><br>"));
  }
  state.modal=null;render();
}

function downloadProcess(id){openDownloadMenu("process",id)}
function downloadArea(aid){openDownloadMenu("area",aid)}

// ============ INIT ============
async function init(){
  document.getElementById("app").innerHTML='<div style="display:flex;align-items:center;justify-content:center;padding:60px;color:#5f5e5a;font-size:14px;"><div style="width:20px;height:20px;border:3px solid #ddd;border-top-color:#1b2877;border-radius:50%;animation:spin 1s linear infinite;margin-right:12px;"></div>Cargando manual...</div>';

  const [processes,proposals,areas,catalog,users]=await Promise.all([
    dbGetProcesses(),
    dbGetProposals(),
    dbGetAreas(),
    dbGetCatalog(),
    dbGetUsers(),
  ]);

  if(processes.length>0) state.processes=processes;
  if(proposals.length>0) state.proposals=proposals;
  if(areas.length>0) AREAS.splice(0,AREAS.length,...areas);
  if(catalog.length>0) state.catalog=catalog;
  if(users.length>0){
    USERS.splice(0,USERS.length,...users.map(u=>({
      user:u.username,
      pass:u.pass,
      name:u.name,
      role:u.role,
      isAdmin:!!u.is_admin,
      areaIds:u.area_ids||null
    })));
  }

  render();
}

init();
</script>
